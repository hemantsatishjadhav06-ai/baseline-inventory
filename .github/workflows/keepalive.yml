name: keepalive
# Keep the free Render process warm without touching Magento-backed data routes.
# Repeated health failures fail the workflow so the outage is visible.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping process-only health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 \
            --retry 3 --retry-delay 5 --retry-all-errors \
            https://baseline-api-hbul.onrender.com/api/health > /dev/null
          echo "health ping $(date -u)"
