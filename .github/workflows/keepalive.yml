name: keepalive
# Keep the free Render process warm without touching Magento-backed data routes.
# Liveness wakes the process; readiness failures make an empty cache visible.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Wake process and verify ready cache
        run: |
          curl --fail --silent --show-error --max-time 30 \
            --retry 3 --retry-delay 5 --retry-all-errors \
            https://baseline-api-hbul.onrender.com/healthz > /dev/null
          curl --fail --silent --show-error --max-time 30 \
            --retry 5 --retry-delay 10 --retry-all-errors \
            https://baseline-api-hbul.onrender.com/readyz > /dev/null
          echo "liveness and readiness verified $(date -u)"
