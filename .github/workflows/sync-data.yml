name: sync-data
# Magento IP-restricts: only the Render backend (allowed IP) can reach it. So GitHub Actions
# SNAPSHOTS the backend (catalog+sales+stock+topsellers) into data/live.json every 15 min.
# The static dashboard reads live.json => always fresh, no user-facing cold start.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: sync-data
  cancel-in-progress: true
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snapshot backend -> live.json
        run: |
          python3 - <<'PY'
          import json, urllib.request, time, datetime
          API = "https://baseline-api-hbul.onrender.com"
          def get(p):
              with urllib.request.urlopen(API + p, timeout=120) as r: return json.load(r)
          try: urllib.request.urlopen(urllib.request.Request(API + "/api/sync", method="POST"), timeout=10)
          except Exception: pass
          ready = False
          for _ in range(28):
              try:
                  h = get("/api/health")
                  if h.get("catalogLive") and h.get("salesLive") and h.get("ordersLive") and h.get("stockLive"):
                      ready = True; break
              except Exception: pass
              time.sleep(15)
          cat = get("/api/catalog"); sales = get("/api/sales"); top = get("/api/topsellers")
          out = {
              "generatedAt": datetime.datetime.utcnow().isoformat() + "Z",
              "ready": ready,
              "source": cat.get("source"),
              "totalProducts": cat.get("totalProducts"),
              "count": cat.get("count"),
              "skus": cat.get("skus", []),
              "sales": {"available": bool(sales.get("available")), "today": sales.get("today"), "week": sales.get("week"), "month": sales.get("month"), "currency": "INR", "byStoreMonth": sales.get("byStoreMonth"), "byStoreToday": sales.get("byStoreToday")},
              "topSellers": {"available": bool(top.get("available")), "today": top.get("today", []), "week": top.get("week", []), "month": top.get("month", []), "all": top.get("all", [])},
          }
          stock_live = (cat.get("source") or {}).get("stock") == "live"
          if out["count"] and stock_live and out["sales"]["available"]:
              open("/tmp/live.json", "w").write(json.dumps(out)); print("READY — will publish")
          else:
              print("NOT READY (count/stock/sales incomplete) — skipping publish to keep last-good data")
          print("ready", ready, "| stockLive", stock_live, "| count", out["count"], "| today", out["sales"]["today"])
          PY
      - name: Publish to data branch (only if fresh data is complete)
        run: |
          if [ ! -f /tmp/live.json ]; then echo "no fresh file — keeping last-good live.json"; exit 0; fi
          git config user.name "baseline-bot"; git config user.email "bot@baseline.local"
          git checkout --orphan data
          git rm -rf . >/dev/null 2>&1 || true
          cp /tmp/live.json live.json
          git add live.json
          git commit -m "data: live.json $(date -u +%FT%TZ)"
          git push -f origin data
