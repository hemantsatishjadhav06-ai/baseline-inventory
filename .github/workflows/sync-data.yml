name: sync-data
# Snapshot the API's cached state. This workflow must never start a Magento crawl;
# the backend owns one serialized, six-hour synchronization schedule.
on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: sync-data
  cancel-in-progress: true
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Snapshot cached backend state
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import urllib.request

          API = "https://baseline-api-hbul.onrender.com"

          def get(path):
              with urllib.request.urlopen(API + path, timeout=60) as response:
                  return json.load(response)

          try:
              health = get("/api/health")
          except Exception as error:
              print("backend unavailable — keeping last-good live.json:", error)
              raise SystemExit(0)

          required = ("catalogLive", "salesLive", "ordersLive", "stockLive")
          ready = all(health.get(field) for field in required)
          if not ready:
              print("backend cache is not ready — keeping last-good live.json")
              print({field: health.get(field) for field in required})
              raise SystemExit(0)

          catalog = get("/api/catalog")
          sales = get("/api/sales")
          top = get("/api/topsellers")
          output = {
              "generatedAt": datetime.datetime.now(datetime.timezone.utc).isoformat(),
              "lastSync": health.get("lastSync"),
              "ready": True,
              "source": catalog.get("source"),
              "totalProducts": catalog.get("totalProducts"),
              "count": catalog.get("count"),
              "skus": catalog.get("skus", []),
              "sales": {
                  "available": bool(sales.get("available")),
                  "today": sales.get("today"),
                  "week": sales.get("week"),
                  "month": sales.get("month"),
                  "currency": "INR",
                  "byStoreMonth": sales.get("byStoreMonth"),
                  "byStoreToday": sales.get("byStoreToday"),
              },
              "topSellers": {
                  "available": bool(top.get("available")),
                  "today": top.get("today", []),
                  "week": top.get("week", []),
                  "month": top.get("month", []),
                  "all": top.get("all", []),
              },
          }
          stock_live = (catalog.get("source") or {}).get("stock") == "live"
          if output["count"] and stock_live and output["sales"]["available"]:
              with open("/tmp/live.json", "w") as handle:
                  json.dump(output, handle)
              print("READY — will publish cached snapshot")
          else:
              print("incomplete cache — keeping last-good live.json")
          print("lastSync", output["lastSync"], "| count", output["count"], "| today", output["sales"]["today"])
          PY
      - name: Publish to data branch
        run: |
          if [ ! -f /tmp/live.json ]; then echo "no fresh file — keeping last-good live.json"; exit 0; fi
          git config user.name "baseline-bot"
          git config user.email "bot@baseline.local"
          git checkout --orphan data
          git rm -rf . >/dev/null 2>&1 || true
          cp /tmp/live.json live.json
          git add live.json
          git commit -m "data: cached live.json $(date -u +%FT%TZ)"
          git push -f origin data
