# Render Blueprint for Baseline
# Deploy: push this repo to GitHub, then in Render → New → Blueprint,
# point at the repo. Render reads this file and provisions everything.
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Frontend: the Baseline dashboard (static site) ───────────────
  - type: web
    name: baseline-dashboard
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
    routes:
      - type: rewrite
        source: /*
        destination: /index.html   # SPA fallback

